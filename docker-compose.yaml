name: firecrawl

x-common-service: &common-service
  # NOTE: If you don't want to build the service locally,
  # comment out the build: statement and uncomment the image: statement
  image: ghcr.io/firecrawl/firecrawl:latest
  pull_policy: always

  ulimits:
    nofile:
      soft: 65535
      hard: 65535
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"
      compress: "true"
x-common-env: &common-env
  REDIS_URL: ${REDIS_URL:-redis://redis:6379}
  REDIS_RATE_LIMIT_URL: ${REDIS_URL:-redis://redis:6379}
  PLAYWRIGHT_MICROSERVICE_URL: ${PLAYWRIGHT_MICROSERVICE_URL:-http://playwright-service:3000/scrape}
  POSTGRES_USER: ${POSTGRES_USER:-postgres}
  POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-postgres}"
  POSTGRES_DB: ${POSTGRES_DB:-postgres}
  POSTGRES_HOST: ${POSTGRES_HOST:-nuq-postgres}
  POSTGRES_PORT: ${POSTGRES_PORT:-5432}
  NUQ_DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@${POSTGRES_HOST:-nuq-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-postgres}
  USE_DB_AUTHENTICATION: ${USE_DB_AUTHENTICATION:-false}
  NUQ_WORKER_COUNT: ${NUQ_WORKER_COUNT:-1}
  NUM_WORKERS_PER_QUEUE: ${NUM_WORKERS_PER_QUEUE:-8}
  CRAWL_CONCURRENT_REQUESTS: ${CRAWL_CONCURRENT_REQUESTS:-10}
  MAX_CONCURRENT_JOBS: ${MAX_CONCURRENT_JOBS:-5}
  BROWSER_POOL_SIZE: ${BROWSER_POOL_SIZE:-5}
  OPENAI_API_KEY: ${OPENROUTER_API_KEY:-${OPENAI_API_KEY}}
  OPENAI_BASE_URL: ${OPENROUTER_BASE_URL:-${OPENAI_BASE_URL}}
  MODEL_NAME: ${FIRECRAWL_MODEL:-${MODEL_NAME}}
  MODEL_EMBEDDING_NAME: ${MODEL_EMBEDDING_NAME} 
  OLLAMA_BASE_URL: ${OLLAMA_BASE_URL} 
  AUTUMN_SECRET_KEY: ${AUTUMN_SECRET_KEY}
  SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
  BULL_AUTH_KEY: ${BULL_AUTH_KEY}
  TEST_API_KEY: ${TEST_API_KEY}
  SUPABASE_ANON_TOKEN: ${SUPABASE_ANON_TOKEN}
  SUPABASE_URL: ${SUPABASE_URL}
  SUPABASE_SERVICE_TOKEN: ${SUPABASE_SERVICE_TOKEN}
  SELF_HOSTED_WEBHOOK_URL: ${SELF_HOSTED_WEBHOOK_URL}
  LOGGING_LEVEL: ${LOGGING_LEVEL}
  PROXY_SERVER: ${PROXY_SERVER}
  PROXY_USERNAME: ${PROXY_USERNAME}
  PROXY_PASSWORD: ${PROXY_PASSWORD}
  HTTP_PROXY: ${HTTP_PROXY}
  HTTPS_PROXY: ${HTTPS_PROXY}
  ALL_PROXY: ${ALL_PROXY}
  NO_PROXY: ${NO_PROXY}
  SEARXNG_ENDPOINT: ${SEARXNG_ENDPOINT:-http://127.0.0.1:8080}
  SEARXNG_ENGINES: ${SEARXNG_ENGINES}
  SEARXNG_CATEGORIES: ${SEARXNG_CATEGORIES}

services:
  egress-1:
    image: tailscale/tailscale:latest
    profiles:
      - host-egress
    hostname: ${HOST_EGRESS_TAILSCALE_HOSTNAME:-egress-1}
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      TS_AUTHKEY: ${HOST_EGRESS_TAILSCALE_AUTH_KEY}
      TS_STATE_DIR: /var/lib/tailscale
      TS_HOSTNAME: ${HOST_EGRESS_TAILSCALE_HOSTNAME:-egress-1}
      TS_AUTH_ONCE: "true"
      TS_ACCEPT_DNS: "false"
      TS_USERSPACE: "false"
      TS_ENABLE_HEALTH_CHECK: "true"
      TS_LOCAL_ADDR_PORT: ${HOST_EGRESS_TAILSCALE_LOCAL_ADDR_PORT:-0.0.0.0:9002}
      TS_EXTRA_ARGS: ${HOST_EGRESS_TAILSCALE_EXTRA_ARGS}
      TZ: ${TZ:-America/Los_Angeles}
    networks:
      - backend
    volumes:
      - egress-1-tailscale-state:/var/lib/tailscale
    ports:
      - "${HOST_EGRESS_TAILSCALE_PROXY_BIND_HOST:-127.0.0.1}:${HOST_EGRESS_TAILSCALE_PROXY_BIND_PORT:-13128}:8888/tcp"
      - "${PORT:-3002}:${INTERNAL_PORT:-3002}"

  egress-1-proxy:
    build: docker/host-egress-proxy
    profiles:
      - host-egress
    restart: unless-stopped
    depends_on:
      - egress-1
    network_mode: "service:egress-1"

  playwright-service:
    # NOTE: If you don't want to build the service locally,
    # comment out the build: statement and uncomment the image: statement
    image: ghcr.io/firecrawl/playwright-service:latest
    pull_policy: always
    environment:
      PORT: 3000
      PROXY_SERVER: ${PROXY_SERVER}
      PROXY_USERNAME: ${PROXY_USERNAME}
      PROXY_PASSWORD: ${PROXY_PASSWORD}
      ALLOW_LOCAL_WEBHOOKS: ${ALLOW_LOCAL_WEBHOOKS}
      HTTP_PROXY: ${HTTP_PROXY}
      HTTPS_PROXY: ${HTTPS_PROXY}
      ALL_PROXY: ${ALL_PROXY}
      NO_PROXY: ${NO_PROXY}
      BLOCK_MEDIA: ${BLOCK_MEDIA}
      # Configure maximum concurrent pages for Playwright browser instances
      MAX_CONCURRENT_PAGES: ${CRAWL_CONCURRENT_REQUESTS:-10}
    network_mode: "service:egress-1"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"

  api:
    <<: *common-service
    environment:
      <<: *common-env
      HOST: "0.0.0.0"
      PORT: ${INTERNAL_PORT:-3002}
      PLAYWRIGHT_MICROSERVICE_URL: http://127.0.0.1:3000/scrape
      EXTRACT_WORKER_PORT: ${EXTRACT_WORKER_PORT:-3004}
      WORKER_PORT: ${WORKER_PORT:-3005}
      NUQ_RABBITMQ_URL: amqp://rabbitmq:5672
      ENV: local
    depends_on:
      redis:
        condition: service_started
      playwright-service:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    network_mode: "service:egress-1"
    command: sh -lc 'node -e "const fs=require(\"fs\");const p=\"dist/src/utils/integration.js\";if(fs.existsSync(p)){let t=fs.readFileSync(p,\"utf8\");if(!t.includes(\"IntegrationEnum[\\\"CLI\\\"]\")){t=t.replace(\"})(IntegrationEnum || (IntegrationEnum = {}));\",\"    IntegrationEnum[\\\"CLI\\\"] = \\\"cli\\\";\\n})(IntegrationEnum || (IntegrationEnum = {}));\");fs.writeFileSync(p,t);}}" && exec node dist/src/harness.js --start-docker'

  searxng:
    image: docker.io/searxng/searxng:latest
    pull_policy: always
    restart: unless-stopped
    environment:
      SEARXNG_BASE_URL: ${SEARXNG_BASE_URL:-http://127.0.0.1:8080/}
      BIND_ADDRESS: ${SEARXNG_BIND_ADDRESS:-0.0.0.0:8080}
    volumes:
      - ./docker/searxng:/etc/searxng:rw
    network_mode: "service:egress-1"

  redis:
    # NOTE: If you want to use Valkey (open source) instead of Redis (source available),
    # uncomment the Valkey statement and comment out the Redis statement.
    # Using Valkey with Firecrawl is untested and not guaranteed to work. Use with caution.
    image: redis:alpine
    # image: valkey/valkey:alpine

    networks:
      - backend
    command: redis-server --bind 0.0.0.0
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
        compress: "true"
    
  rabbitmq:
    image: rabbitmq:3-management
    networks:
      - backend
    command: rabbitmq-server
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
        compress: "true"
  
  nuq-postgres:
    build: apps/nuq-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    networks:
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"

networks:
  backend:
    driver: bridge

volumes:
  egress-1-tailscale-state:
